<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Clarity</title>

    <!--
      INLINE SKELETON — paints before any JS or external CSS.
      Matches the Entry screen exactly (same background, same font)
      so there's zero visual jump when React mounts.
    -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        /* Matches the gradient drift start color in Entry.jsx */
        background: #e8eaf6;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #root {
        width: 100%;
        min-height: 100vh;
      }

      /* Minimal pre-render skeleton — just the background, no content.
         React replaces #root in one frame so the skeleton is invisible
         to users on any decent connection. */
      #c-skeleton {
        min-height: 100vh;
        background: #e8eaf6;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Blank skeleton — Entry screen IS the landing page now -->
      <div id="c-skeleton"></div>
    </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
